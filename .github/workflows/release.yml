name: Release

# Auto-publish a GitHub Release whenever a version tag is pushed, so HACS always
# sees the new version (HACS offers updates from published Releases, not bare tags).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog notes for this tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="## $VERSION" '
            $0==ver {grab=1; next}
            /^## / && grab {exit}
            grab {print}
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release $GITHUB_REF_NAME" > release_notes.md
          fi
          echo "----- notes -----"; cat release_notes.md

      - name: Create or update the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" --notes-file release_notes.md --latest
          else
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" --notes-file release_notes.md --latest
          fi
